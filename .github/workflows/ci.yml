name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        run: go build -o ryanDB .

      - name: Run unit tests with race detector
        run: go test -race -count=1 -timeout 5m ./core

      - name: Run integration tests
        run: go test -count=3 -timeout 10m -v ./test
