name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.8"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        run: go build -o ryanDB .

      - name: Run integration tests
        run: go test -v ./test
